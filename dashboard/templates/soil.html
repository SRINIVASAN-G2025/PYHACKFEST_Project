<!DOCTYPE html>
<html>
<head>
    <title>Eco Monitor — Soil Quality</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #eef4fb;
            color: #0f172a;
        }

        * { box-sizing: border-box; }

        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #111827; color: #f8fafc; padding: 30px 24px; display: flex; flex-direction: column; gap: 18px; }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
        .brand-dot { width: 12px; height: 12px; border-radius: 50%; background: radial-gradient(circle at top left, #22c55e, #3b82f6); }
        .brand-title { font-size: 18px; font-weight: 700; }
        .sidebar nav { display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 12px 14px; border-radius: 14px; color: inherit; text-decoration: none; cursor: pointer; transition: background 0.2s ease; }
        .nav-item.active, .nav-item:hover { background: rgba(255, 255, 255, 0.08); }
        .bottom-links { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        .main-area { flex: 1; padding: 28px; }
        .page-card { background: white; border-radius: 28px; padding: 32px; box-shadow: 0 24px 60px rgba(15,23,42,0.08); }
        h1 { margin: 0 0 18px; font-size: 32px; }
        p { margin: 0; color: #475569; }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <span class="brand-dot"></span>
            <div>
                <div class="brand-title">Eco Monitor</div>
                <div style="font-size: 12px; color: #94a3b8;">Berlin</div>
            </div>
        </div>
        <nav>
            <a href="/overview/" class="nav-item">Overview</a>
            <a href="/" class="nav-item">Air quality</a>
            <a href="/water/" class="nav-item">Water quality</a>
            <a href="/soil/" class="nav-item active">Soil quality</a>
        </nav>
        <div class="bottom-links">
            <a href="#" class="nav-item">Profile</a>
            <a href="#" class="nav-item">Log out</a>
        </div>
    </aside>
    <main class="main-area">
        <div class="page-card">
            <h1>Soil Quality</h1>
            <p>This is the soil quality page. You can expand it with soil data and charts later.</p>
        </div>
    </main>
</div>
</body>
</html>
